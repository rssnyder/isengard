apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: harness-delegate-ng
  namespace: harness-delegate-ng
spec:
  interval: 5m
  url: https://app.harness.io/storage/harness-download/delegate-helm-chart

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harness-delegate-ng
  namespace: harness-delegate-ng
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: harness-delegate-ng
      version: "1.0.30"
      sourceRef:
        kind: HelmRepository
        name: harness-delegate-ng
      interval: 5m
  values:
    delegateName: some
    tags: flux
    accountId: wlgELJ0TTre5aZhzpt8gVA
    existingDelegateToken: delegate-token
    managerEndpoint: https://app.harness.io/gratis
    delegateDockerImage: harness/delegate:25.10.86902
    replicas: 1
    cpu: 100m
    memory: 1500
    upgrader:
      enabled: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: harness-delegate-tokenreview-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: some
    namespace: harness-delegate-ng