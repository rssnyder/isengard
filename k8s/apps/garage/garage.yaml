apiVersion: v1
kind: Namespace
metadata:
  name: garage

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    metadata_dir = "/data/meta"
    data_dir = "/data/data"
    
    replication_mode = "none"
    
    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "[::]:3901"
    rpc_secret = "${GARAGE_RPC_SECRET}"
    
    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.g3.r.ss"
    
    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.g3.r.ss"
    
    [admin]
    api_bind_addr = "[::]:3903"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      initContainers:
      - name: config-init
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache gettext
          export GARAGE_RPC_SECRET=$(cat /secrets/rpc-secret)
          envsubst < /config-template/garage.toml > /config/garage.toml
          echo "Config generated with RPC secret"
        volumeMounts:
        - name: garage-config-template
          mountPath: /config-template
        - name: garage-config-rendered
          mountPath: /config
        - name: garage-rpc-secret
          mountPath: /secrets
      containers:
      - name: garage
        image: dxflrs/garage:v1.0.1
        imagePullPolicy: IfNotPresent
        command: ["/garage", "-c", "/config/garage.toml", "server"]
        ports:
        - name: s3-api
          containerPort: 3900
        - name: rpc
          containerPort: 3901
        - name: web
          containerPort: 3902
        - name: admin
          containerPort: 3903
        volumeMounts:
        - name: garage-data
          mountPath: /data
        - name: garage-config-rendered
          mountPath: /config
        env:
        - name: RUST_LOG
          value: "garage=info"
      volumes:
      - name: garage-config-template
        configMap:
          name: garage-config
      - name: garage-config-rendered
        emptyDir: {}
      - name: garage-rpc-secret
        secret:
          secretName: garage-rpc-secret
  volumeClaimTemplates:
  - metadata:
      name: garage-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
apiVersion: v1
kind: Service
metadata:
  name: garage-s3
  namespace: garage
spec:
  type: LoadBalancer
  selector:
    app: garage
  ports:
  - name: s3-api
    port: 3900
    targetPort: s3-api
  - name: admin
    port: 3903
    targetPort: admin

---
apiVersion: v1
kind: Service
metadata:
  name: garage-rpc
  namespace: garage
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: garage
  ports:
  - name: rpc
    port: 3901
    targetPort: rpc
