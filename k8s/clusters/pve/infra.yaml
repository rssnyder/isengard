---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harness-delegate-ng-work
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-bao
  interval: 1h
  path: ./k8s/infrastructure/base/harness
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    - patch: |
        - op: replace
          path: /metadata/name
          value: work-pve
        - op: replace
          path: /spec/values/delegateName
          value: work-pve
        - op: replace
          path: /spec/values/tags
          value: build-farm,linux,homelab,proxmox,pve
        - op: replace
          path: /spec/values/existingDelegateToken
          value: work-delegate-token
        - op: replace
          path: /spec/values/accountId
          value: wlgELJ0TTre5aZhzpt8gVA
        - op: replace
          path: /spec/values/managerEndpoint
          value: https://app.harness.io/gratis
        - op: replace
          path: /spec/values/delegateDockerImage
          value: us-docker.pkg.dev/gar-prod-setup/harness-public/harness/delegate:25.11.87202
      target:
        kind: HelmRelease
    - patch: |
        - op: replace
          path: /metadata/name
          value: work-pve-tokenreview
        - op: replace
          path: /subjects/0/name
          value: work-pve
      target:
        kind: ClusterRoleBinding

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harness-delegate-ng-work-shared
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-bao
  interval: 1h
  path: ./k8s/infrastructure/base/harness
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    - patch: |
        - op: replace
          path: /metadata/name
          value: work-shared-pve
        - op: replace
          path: /spec/values/delegateName
          value: work-shared-pve
        - op: replace
          path: /spec/values/tags
          value: rssnyder,linux,homelab,proxmox,pve
        - op: replace
          path: /spec/values/existingDelegateToken
          value: work-shared-delegate-token
        - op: replace
          path: /spec/values/accountId
          value: AM8HCbDiTXGQNrTIhNl7qQ
        - op: replace
          path: /spec/values/managerEndpoint
          value: https://app.harness.io/gratis
        - op: replace
          path: /spec/values/delegateDockerImage
          value: us-docker.pkg.dev/gar-prod-setup/harness-public/harness/delegate:26.03.88802
        - op: add
          path: /spec/values/custom_envs
          value:
            - name: HARNESS_LOG_STREAMING_STDOUT_ENABLED
              value: "true"
      target:
        kind: HelmRelease
    - patch: |
        - op: replace
          path: /metadata/name
          value: work-shared-pve-tokenreview
        - op: replace
          path: /subjects/0/name
          value: work-shared-pve
      target:
        kind: ClusterRoleBinding

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: proxmox
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-bao
  interval: 1h
  path: ./k8s/infrastructure/pve/proxmox
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: awx-operator
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/ansible/awx-operator
  ref:
    semver: 2.19.1

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: awx-operator
  namespace: flux-system
spec:
  interval: 1h
  path: ./config/default
  prune: true
  sourceRef:
    kind: GitRepository
    name: awx-operator
