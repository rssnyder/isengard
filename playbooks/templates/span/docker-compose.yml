services:

{{ alloy_compose | to_nice_yaml(indent=2) | indent(2, first=True) }}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-span}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-span}
      POSTGRES_DB: ${POSTGRES_DB:-span}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-span}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - span_net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - span_net

  api:
    image: git.ttdsm.org/rssnyder/span-api:${TAG:-latest}
    ports:
      - "${PORT}:${PORT}"
      - "${ADMIN_PORT}:${ADMIN_PORT}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - span_net

  web:
    image: git.ttdsm.org/rssnyder/span-web:${TAG:-latest}
    ports:
      - "80:80"
    networks:
      - span_net

volumes:
  postgres_data:
  minio_data:
  alloy_data:

networks:
  span_net:
